<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>home</title>
    <style>
      html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        background: #14110f; color: #e8e2da; -webkit-user-select: text; }
      #wrap { padding: 1.75rem; box-sizing: border-box; height: 100%; display: flex; flex-direction: column; }
      h1 { font-size: .85rem; letter-spacing: .06em; text-transform: uppercase; color: #9a938a;
        margin: 0 0 1rem; font-weight: 600; }
      p.lede { color: #9a9a9a; font-size: .85rem; margin: 0 0 1.1rem; max-width: 32rem; }
      button.action { align-self: flex-start; background: #211d1a; border: 1px solid #322c28;
        border-radius: 8px; padding: .6rem 1.1rem; color: inherit; font: inherit; cursor: pointer; }
      button.action:hover { background: #2a2521; border-color: #4a423c; }
      pre { white-space: pre-wrap; word-break: break-word; color: #ff8a8a; background: #2a2a2a;
        border: 1px solid #3a3a3a; border-radius: 8px; padding: 14px 18px; margin: 0 0 1.1rem;
        text-align: left; font-size: .82rem; }
      ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: .5rem; }
      li button { width: 100%; display: flex; align-items: center; gap: .75rem;
        background: #211d1a; border: 1px solid #322c28; border-radius: 8px;
        padding: .7rem .85rem; color: inherit; font: inherit; text-align: left;
        cursor: pointer; }
      li button:hover { background: #2a2521; border-color: #4a423c; }
      .swatch { width: 14px; height: 14px; border-radius: 4px; flex: 0 0 auto;
        box-shadow: 0 0 0 1px rgba(255,255,255,.08) inset; background: #4a423c; }
      .title { flex: 1 1 auto; }
      .state { font-size: .72rem; color: #8a837a; }
      .open .state { color: #6fae7a; }
      .empty { color: #8a837a; font-size: .85rem; }
    </style>
  </head>
  <body>
    <div id="wrap"></div>
    <script>
      const { invoke } = window.__TAURI__.core;
      const wrap = document.getElementById('wrap');

      function el(tag, props) {
        const e = document.createElement(tag);
        return Object.assign(e, props || {});
      }

      function renderNoConfig(p) {
        wrap.append(
          el('h1', { textContent: `${p.appName} — home` }),
          el('p', { className: 'lede', textContent: `No config found at ${p.path}.` }),
          el('button', {
            className: 'action',
            textContent: 'Create a starter config',
            onclick: () => invoke('shell_home_create_config'),
          }),
        );
      }

      function renderBroken(p) {
        wrap.append(
          el('h1', { textContent: `${p.appName} couldn't load your config` }),
          el('pre', { textContent: p.error }),
          el('button', {
            className: 'action',
            textContent: 'Edit Config',
            onclick: () => invoke('shell_home_edit_config'),
          }),
        );
      }

      function renderWindows(p) {
        wrap.append(el('h1', { textContent: `${p.appName} — windows` }));
        const list = el('ul');
        const windows = p.windows || [];
        if (windows.length === 0) {
          list.append(el('li', { className: 'empty', textContent: 'No windows configured.' }));
        } else {
          for (const w of windows) {
            const li = el('li', { className: w.open ? 'open' : '' });
            const btn = el('button', { onclick: () => invoke('shell_home_open_window', { id: w.id }) });
            const swatch = el('span', { className: 'swatch' });
            if (w.colour) swatch.style.background = w.colour;
            btn.append(
              swatch,
              el('span', { className: 'title', textContent: w.title }),
              el('span', { className: 'state', textContent: w.open ? 'open' : 'open →' }),
            );
            li.append(btn);
            list.append(li);
          }
        }
        wrap.append(list);
      }

      function render(p) {
        wrap.innerHTML = '';
        if (p.state === 'no_config') renderNoConfig(p);
        else if (p.state === 'broken') renderBroken(p);
        else renderWindows(p);
      }

      // Both the initial payload and a later refresh event arrive as a JSON-text STRING (Tauri
      // serializes the Rust `String` payload_json produces as a JS string either way) — parse both
      // identically rather than treating the initial one as an already-live object.
      render(window.__SHELL_HOME__
        ? JSON.parse(window.__SHELL_HOME__)
        : { state: 'windows', windows: [], appName: '' });
      // Already-open refresh: show_home pushes a fresh payload rather than rebuilding the window.
      window.__TAURI__.event.listen('shell:home-refresh', e => render(JSON.parse(e.payload)));
    </script>
  </body>
</html>
