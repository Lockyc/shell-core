# Pin the toolchain so rustfmt/clippy behave identically for everyone and in any
# future CI — an unpinned `stable` drifts and re-wraps committed code. rustup
# auto-installs this on first cargo use.
#
# This is NOT the canonical pin — config-core's is. Match this to config-core's
# channel when that one moves. shell-core is a *git dependency* of its consumers,
# so this pin does NOT reach them: it governs only standalone shell-core
# development, and each consuming app compiles shell-core with its own pin.
[toolchain]
channel = "1.96.0"
components = ["rustfmt", "clippy"]
